{% extends 'base.html' %}{% block content %}<h2>Ledger Report : {{name}}</h2><div class=card><table><tr><th>Date</th><th>Type</th><th>No</th><th>Debit</th><th>Credit</th><th>Narration</th></tr>{% for r in rows %}<tr><td>{{r.date}}</td><td>{{r.type}}</td><td>{{r.no}}</td><td>{{r.debit}}</td><td>{{r.credit}}</td><td>{{r.narration}}</td></tr>{% endfor %}<tr><th colspan=3>Closing Balance</th><th colspan=3>{{balance}}</th></tr></table></div>{% endblock %}
