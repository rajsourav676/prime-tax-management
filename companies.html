{% extends 'base.html' %}{% block content %}<h2>Company</h2><div class=grid><div class=card><h3>Create Company</h3><form method=post><input name=name placeholder='Company Name' required><input name=owner placeholder=Owner><input name=gstin placeholder=GSTIN><input name=pan placeholder=PAN><textarea name=address placeholder=Address></textarea><label>FY Start</label><input type=date name=fy_start value='2025-04-01'><label>FY End</label><input type=date name=fy_end value='2026-03-31'><button>Create Company</button></form></div><div class=card><h3>Open Company</h3><table><tr><th>Name</th><th>FY</th><th>Action</th></tr>{% for r in rows %}<tr><td>{{r.name}}</td><td>{{r.fy_start}} to {{r.fy_end}}</td><td><a class=btn href=/open_company/{{r.id}}>Open</a> <a class=del href=/company_delete/{{r.id}}>Delete</a></td></tr>{% endfor %}</table></div></div>{% endblock %}
