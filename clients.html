{% extends 'base.html' %}{% block content %}<h2>Client Master</h2><div class=grid><div class=card><form method=post><input name=name placeholder='Client Name' required><input name=mobile placeholder=Mobile><input name=email placeholder=Email><input name=pan placeholder=PAN><input name=aadhaar placeholder=Aadhaar><input name=gstin placeholder=GSTIN><input name=gst_user placeholder='GST Login ID'><input name=gst_hint placeholder='GST Password Hint'><input name=it_user placeholder='Income Tax Login ID'><input name=it_hint placeholder='IT Password Hint'><input name=work_type placeholder='Work Type'><input name=work_amount type=number step=.01 placeholder='Work Amount'><input name=received type=number step=.01 placeholder='Received'><textarea name=remarks placeholder=Remarks></textarea><button>Save Client</button></form></div><div class=card><a class=btn href=/export/clients>Export CSV</a><table><tr><th>Name</th><th>Mobile</th><th>PAN</th><th>GSTIN</th><th>Work</th><th>Received</th><th>Due</th></tr>{% for r in rows %}<tr><td>{{r.name}}</td><td>{{r.mobile}}</td><td>{{r.pan}}</td><td>{{r.gstin}}</td><td>{{r.work_amount}}</td><td>{{r.received}}</td><td>{{r.due}}</td></tr>{% endfor %}</table><h3>Receive Client Payment</h3><form method=post action="/client_payment/{{rows[0].id if rows else 0}}" onsubmit="this.action='/client_payment/'+this.client_id.value"><select name=client_id>{% for r in rows %}<option value="{{r.id}}">{{r.name}} | Due {{r.due}}</option>{% endfor %}</select><input type=date name=pdate><input name=amount type=number step=.01 placeholder="Received Amount"><input name=mode placeholder="Mode"><input name=remarks placeholder="Remarks"><button>Update Received</button></form></div></div>{% endblock %}
