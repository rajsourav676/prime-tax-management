{% extends 'base.html' %}{% block content %}<h2>Receipt / Payment Against Invoice</h2><div class=grid><div class=card><form method=post><label>Invoice</label><select name=invoice_id>{% for i in invoices %}<option value='{{i.id}}'>{{i.itype}} {{i.invno}} | {{i.party}} | Due {{i.due}}</option>{% endfor %}</select><input type=date name=pdate value='{{today}}'><select name=ledger>{% for l in ledgers %}<option>{{l.name}}</option>{% endfor %}</select><input name=amount type=number step=.01 placeholder=Amount required><textarea name=narration placeholder=Narration></textarea><button>Adjust Payment + Post Voucher</button></form></div><div class=card><h3>Payment History</h3><table><tr><th>Date</th><th>Invoice</th><th>Party</th><th>Ledger</th><th>Amount</th></tr>{% for r in rows %}<tr><td>{{r.pdate}}</td><td>{{r.invno}}</td><td>{{r.party}}</td><td>{{r.ledger}}</td><td>{{r.amount}}</td></tr>{% endfor %}</table></div></div>{% endblock %}
