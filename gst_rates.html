{% extends 'base.html' %}{% block content %}<h2>GST Rate / HSN Master</h2><div class=grid><div class=card><form method=post><input name=name placeholder='Name e.g. GST 18%'><input name=rate type=number step=.01 placeholder='GST Rate %' required><input name=hsn_sac placeholder='HSN/SAC'><button>Save</button></form></div><div class=card><table><tr><th>Name</th><th>Rate</th><th>HSN/SAC</th></tr>{% for r in rows %}<tr><td>{{r.name}}</td><td>{{r.rate}}</td><td>{{r.hsn_sac}}</td></tr>{% endfor %}</table></div></div>{% endblock %}
