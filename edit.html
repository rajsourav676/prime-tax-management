{% extends 'base.html' %}{% block content %}<h2>{{kind|title}} Alter</h2><div class=card><form method=post>
{% if kind=='group' %}<input name=name value='{{row.name}}' required><input name=parent value='{{row.parent}}'>{% endif %}
{% if kind=='unit' %}<input name=symbol value='{{row.symbol}}' required><input name=formal_name value='{{row.formal_name}}'>{% endif %}
{% if kind=='ledger' %}<input name=name value='{{row.name}}' required><select name=group_name>{% for g in groups %}<option {% if g.name==row.group_name %}selected{% endif %}>{{g.name}}</option>{% endfor %}</select><input name=gstin value='{{row.gstin}}' placeholder=GSTIN><input name=mobile value='{{row.mobile}}' placeholder=Mobile><input name=opening type=number step=.01 value='{{row.opening}}'><select name=drcr><option {% if row.drcr=='Dr' %}selected{% endif %}>Dr</option><option {% if row.drcr=='Cr' %}selected{% endif %}>Cr</option></select>{% endif %}
{% if kind=='item' %}<input name=name value='{{row.name}}' required><select name=unit>{% for u in units %}<option {% if u.symbol==row.unit %}selected{% endif %}>{{u.symbol}}</option>{% endfor %}</select><input name=hsn value='{{row.hsn}}'><input name=gst_rate type=number step=.01 value='{{row.gst_rate}}'><input name=opening_qty type=number step=.01 value='{{row.opening_qty}}'><input name=opening_rate type=number step=.01 value='{{row.opening_rate}}'><input name=reorder type=number step=.01 value='{{row.reorder}}'>{% endif %}
{% if kind=='voucher' %}<input name=vno value='{{row.vno}}'><input type=date name=vdate value='{{row.vdate}}'><select name=debit_ledger>{% for l in ledgers %}<option {% if l.name==row.debit_ledger %}selected{% endif %}>{{l.name}}</option>{% endfor %}</select><select name=credit_ledger>{% for l in ledgers %}<option {% if l.name==row.credit_ledger %}selected{% endif %}>{{l.name}}</option>{% endfor %}</select><input name=amount type=number step=.01 value='{{row.amount}}'><textarea name=narration>{{row.narration}}</textarea><label><input type=checkbox name=optional {% if row.optional %}checked{% endif %}> Optional</label><label><input type=checkbox name=cancelled {% if row.cancelled %}checked{% endif %}> Cancelled</label>{% endif %}
{% if kind=='invoice' %}<select name=itype>{% for t in ['Sales','Purchase','Credit Note','Debit Note'] %}<option {% if t==row.itype %}selected{% endif %}>{{t}}</option>{% endfor %}</select><input name=invno value='{{row.invno}}'><input type=date name=invdate value='{{row.invdate}}'><select name=party>{% for l in ledgers %}<option {% if l.name==row.party %}selected{% endif %}>{{l.name}}</option>{% endfor %}</select><select name=item>{% for i in items %}<option {% if i.name==row.item %}selected{% endif %}>{{i.name}}</option>{% endfor %}</select><input name=qty type=number step=.01 value='{{row.qty}}'><input name=rate type=number step=.01 value='{{row.rate}}'><input name=gst_rate type=number step=.01 value='{{row.gst_rate}}'><select name=place><option {% if row.place=='Local' %}selected{% endif %}>Local</option><option {% if row.place=='Interstate' %}selected{% endif %}>Interstate</option></select><input name=paid type=number step=.01 value='{{row.paid}}'><textarea name=narration>{{row.narration}}</textarea>{% endif %}
<button>Update / Alter (Ctrl+A)</button></form></div>{% endblock %}
