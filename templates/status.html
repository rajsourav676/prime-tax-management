{% extends 'base.html' %}{% block content %}<h2>{{stype|upper}} Tracker</h2><div class=grid><div class=card><form method=post><select name=client_id>{% for c in clients %}<option value={{c.id}}>{{c.name}}</option>{% endfor %}</select>{% if stype=='gst' %}<input name=period placeholder='Period e.g. Apr-2025'><select name=gstr1><option>Pending</option><option>Filed</option></select><select name=gstr3b><option>Pending</option><option>Filed</option></select><input type=date name=due_date>{% elif stype=='itr' %}<input name=ay placeholder='AY 2026-27'><select name=itr_status><option>Pending</option><option>Filed</option></select><input name=refund_status placeholder='Refund Status'><input name=docs placeholder='Document Checklist'>{% else %}<input name=title placeholder='Task Title'><input type=date name=due_date><select name=status><option>Pending</option><option>Done</option></select>{% endif %}<textarea name=remarks placeholder=Remarks></textarea><button>Save</button></form></div><div class=card><table>{% if rows %}<tr>{% for k in rows[0].keys() %}<th>{{k}}</th>{% endfor %}</tr>{% for r in rows %}<tr>{% for k in r.keys() %}<td>{{r[k]}}</td>{% endfor %}</tr>{% endfor %}{% endif %}</table></div></div>{% endblock %}
